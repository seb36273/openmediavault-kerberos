version: "1.0"
type: component
data:
  name: omv-usermgmt-kerberos-datatable-page
  type: datatablePage
  config:
    autoReload: false
    store:
      proxy:
        service: Kerberos
        get:
          method: getKeyTab
    rowId: version
    rowEnumFmt: "{{ version }}"
    columns:
      - name: _("Version")
        prop: version
        sortable: true
      - name: _("Principal")
        prop: principal
        sortable: true
        flexGrow: 1
    actions:
      - type: menu
        icon: add
        tooltip: _("Add")
        actions:
          - text: _("Create new Principal")
            execute:
              type: url
              url: "/usermgmt/kerberos/principal/create"
          - text: _("Add Principal")
            execute:
              type: formDialog
              formDialog:
                title: _("Add Principal")
                request:
                  service: Kerberos
                  method: addKey
                  params:
                    principal: "{{ principal }}"
                fields:
                  - type: textInput
                    name: principal
                    label: _("Principal")
                    hint: _("The name of the principal to add to the local keytab.")
                    validators:
                      required: true
                buttons:
                  - template: submit
                  - template: cancel
      - template: delete
        execute:
          type: request
          request:
            service: Kerberos
            method: removeKey
            params:
              version: "{{ version }}"
              principal: "{{ principal }}"
